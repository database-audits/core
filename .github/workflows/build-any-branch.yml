# Compile and test every branch: unit tests (surefire, *Test) and integration
# tests (failsafe, *IT).
name: Build any branch

on:
  push:
    paths-ignore:
      - "**/src/site/**"
      - "**/*.adoc"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/src/site/**"
      - "**/*.adoc"
      - "**/*.md"

permissions:
  contents: read

env:
  MAVEN_COMMAND: ./mvnw
  MAVEN_CLI_COMMON: "-e -B"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # cold runs pull ~1 GB of database container images
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/jdk-setup
      - name: Compile and run unit and integration tests
        run: ${{ env.MAVEN_COMMAND }} ${{ env.MAVEN_CLI_COMMON }} clean verify

  submit-dependencies:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Submit dependencies to GitHub
        uses: advanced-security/maven-dependency-submission-action@v5
